name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  ci:
    name: Install / Test / Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile - runtime-core
        run: npx tsc -p packages/runtime-core/tsconfig.json --noEmit

      - name: Unit tests
        run: npm test
        env:
          ALLOW_PENDING_IDENTITY: "false"
          ACELOGIC_DEV_LICENSE_FALLBACK: "true"
          ACELOGIC_DEV_LICENSE_TIER: "builder"

      - name: E2E runtime tests
        run: npm run test:e2e
        env:
          ALLOW_PENDING_IDENTITY: "false"
          ACELOGIC_DEV_LICENSE_FALLBACK: "true"
          ACELOGIC_DEV_LICENSE_TIER: "builder"

      - name: Security audit
        run: npm audit --audit-level=moderate
